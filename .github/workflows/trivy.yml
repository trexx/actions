name: 'Trivy'

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: 'string'

permissions:
  contents: 'read'

jobs:
  scan:
    permissions:
      packages: 'read'
      contents: 'write' # for actions/checkout to fetch code
      security-events: 'write' # for github/codeql-action/upload-sarif to upload SARIF results
      actions: 'read' # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: 'scan'
    runs-on: 'ubuntu-24.04'
    steps:
      - name: 'Run Trivy in GitHub SBOM mode and submit results to Dependency Graph'
        uses: 'aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478' # 0.34.2
        env:
          TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db,ghcr.io/aquasecurity/trivy-db'
          TRIVY_JAVA_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db'
        with:
          image-ref: 'ghcr.io/${{ inputs.image-name }}:latest'
          format: 'github'
          output: 'dependency-results.sbom.json'
          github-pat: '${{ secrets.GITHUB_TOKEN }}'

      - name: 'Run Trivy vulnerability scanner'
        uses: 'aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478' # 0.34.2
        env:
          TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db,ghcr.io/aquasecurity/trivy-db'
          TRIVY_JAVA_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db'
        with:
          image-ref: 'ghcr.io/${{ inputs.image-name }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          scanners: 'vuln'

      - name: 'Upload Trivy scan results to GitHub Security tab'
        uses: 'github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162' # v4.32.5
        with:
          sarif_file: 'trivy-results.sarif'
